name: Notify Linear Project

on:
  workflow_call:
    inputs:
      trigger_type:
        description: "push or deploy"
        type: string
        default: "push"
      deploy_status:
        description: "success, failure, or cancelled"
        type: string
        default: "success"
    secrets:
      LINEAR_API_KEY:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post update to Linear project
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          REPO_NAME: ${{ github.event.repository.name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TRIGGER_TYPE: ${{ inputs.trigger_type }}
          DEPLOY_STATUS: ${{ inputs.deploy_status }}
        run: |
          REPO_MAP='{"engagement-log-generator":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","hubspot-prospect-mcp":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","meet-recording-sync":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","highergov-cloud-sync":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","highergov-csv-downloader":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","highergov-opportunity-matcher":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","naics-keyword-bridging":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","cap-statement-generator":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","cap-statement-generator-cloud":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","cap-statement-outputs":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","consulting-reports-automated":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","client-websites":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","fedcon-proposal-skills":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","luke-proposals":"d63b1faa-741a-41c3-a49b-5e8c80ce86c7","hubspot-automations":"9d4c86dd-72ed-4cb6-8fb6-db34ec54613e","hubspot-apps":"9d4c86dd-72ed-4cb6-8fb6-db34ec54613e","fedcon-it":"9d4c86dd-72ed-4cb6-8fb6-db34ec54613e","overnight-tasks":"9d4c86dd-72ed-4cb6-8fb6-db34ec54613e","hubspot-sync":"9d4c86dd-72ed-4cb6-8fb6-db34ec54613e","customer-folder-creator":"9d4c86dd-72ed-4cb6-8fb6-db34ec54613e","fronter-aircall-sync":"9d4c86dd-72ed-4cb6-8fb6-db34ec54613e","fedcon.com":"d30d73cd-9a72-42e7-b479-04e455046494","fedcon-marketing":"d30d73cd-9a72-42e7-b479-04e455046494","nmi-subscription-payments":"d30d73cd-9a72-42e7-b479-04e455046494","voice-intel":"63db4e9d-041c-4324-9e75-87a5f7eccf83","pitch-analysis":"63db4e9d-041c-4324-9e75-87a5f7eccf83","client-management":"44c5926c-69b0-4b19-80f6-f97727942b98","leads-pipeline":"d139b2b5-1bb5-4af6-b71d-cd4992df187c","discovery-app":"9cedb713-978e-4200-8848-e4eb47969f90","prospect-deck-generator":"9cedb713-978e-4200-8848-e4eb47969f90","lead-request-bot":"15fb6c4f-1fc1-45d7-baca-f7ec48730ef4","sales-dashboard":"7c442b6b-1335-4660-b34f-be6a94d5bc1f","campaign-builder":"2b159180-6f7b-4340-8cc3-efb4072fedcd","flagship-2026":"2b159180-6f7b-4340-8cc3-efb4072fedcd","aircall-queue-priority":"66a10302-b537-483c-a860-c6bd7c9d1c0f","busylight-aircall":"66a10302-b537-483c-a860-c6bd7c9d1c0f","presence-sync":"66a10302-b537-483c-a860-c6bd7c9d1c0f","fedbot":"b3addf98-fcd5-4685-bd8d-26c959f51d3c","fleet-ops":"d31278c5-e5b1-42f0-bf56-2121b0b50db4","activity-monitor":"d31278c5-e5b1-42f0-bf56-2121b0b50db4","screen-share-daemon":"d31278c5-e5b1-42f0-bf56-2121b0b50db4","drive-watchdog":"30fb1b55-73af-4d0c-b2d4-b82ce46f2cb2","github-monitor":"30fb1b55-73af-4d0c-b2d4-b82ce46f2cb2","workspace-activity":"30fb1b55-73af-4d0c-b2d4-b82ce46f2cb2"}'

          PROJECT_ID=$(echo "$REPO_MAP" | jq -r --arg repo "$REPO_NAME" '.[$repo] // empty')

          if [ -z "$PROJECT_ID" ]; then
            echo "Repo '$REPO_NAME' not mapped to a Linear project — skipping"
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -1)
          HEALTH="onTrack"

          # Build markdown body using jq for safe JSON string handling
          if printf '%s' "$FIRST_LINE" | grep -qi '^\[linear\]'; then
            NOTE=$(printf '%s' "$FIRST_LINE" | sed 's/^\[linear\] *//I')
            BODY=$(printf '## Update: %s\n\n**Author:** %s\n**Commit:** `%s`\n\n### Note\n%s\n\n[View commit](%s)\n\n---\n*Project update from GitHub Actions*' \
              "$REPO_NAME" "$COMMIT_AUTHOR" "$SHORT_SHA" "$NOTE" "$COMMIT_URL")
          elif [ "$TRIGGER_TYPE" = "deploy" ]; then
            if [ "$DEPLOY_STATUS" = "success" ]; then
              STATUS_TEXT="Deployed successfully"
            else
              STATUS_TEXT="Deploy FAILED"
              HEALTH="atRisk"
            fi
            BODY=$(printf '## Deploy: %s\n\n**Status:** %s\n**Author:** %s\n**Commit:** `%s` — %s\n\n[View commit](%s)\n\n---\n*Automated deploy update from GitHub Actions*' \
              "$REPO_NAME" "$STATUS_TEXT" "$COMMIT_AUTHOR" "$SHORT_SHA" "$FIRST_LINE" "$COMMIT_URL")
          else
            BODY=$(printf '## Commit: %s\n\n**Author:** %s\n**Commit:** `%s` — %s\n\n[View commit](%s)\n\n---\n*Automated commit update from GitHub Actions*' \
              "$REPO_NAME" "$COMMIT_AUTHOR" "$SHORT_SHA" "$FIRST_LINE" "$COMMIT_URL")
          fi

          # Post to Linear GraphQL API
          QUERY='mutation($input: ProjectUpdateCreateInput!) { projectUpdateCreate(input: $input) { success projectUpdate { id url } } }'

          PAYLOAD=$(jq -n \
            --arg query "$QUERY" \
            --arg projectId "$PROJECT_ID" \
            --arg body "$BODY" \
            --arg health "$HEALTH" \
            '{query: $query, variables: {input: {projectId: $projectId, body: $body, health: $health}}}')

          echo "Posting to Linear project: $PROJECT_ID"
          echo "Body length: ${#BODY}"
          echo "Payload preview:"
          echo "$PAYLOAD" | head -c 200
          HTTP_CODE=$(curl -s -o /tmp/linear-response.json -w '%{http_code}' -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_API_KEY" \
            -d "$PAYLOAD")
          RESPONSE=$(cat /tmp/linear-response.json)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "curl failed with HTTP $HTTP_CODE"
            echo "$RESPONSE"
            exit 1
          fi

          SUCCESS=$(printf '%s' "$RESPONSE" | jq -r '.data.projectUpdateCreate.success // false')
          if [ "$SUCCESS" = "true" ]; then
            URL=$(printf '%s' "$RESPONSE" | jq -r '.data.projectUpdateCreate.projectUpdate.url')
            echo "Posted Linear project update: $URL"
          else
            echo "Failed to post Linear update:"
            printf '%s' "$RESPONSE" | jq .
            exit 1
          fi
